spring.application.name=multi-stores
server.port=${PORT:8080}

# Database (H2 for dev; set to MySQL/PostgreSQL in production)
spring.datasource.url=jdbc:h2:mem:multistores;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
jwt.secret=your-256-bit-secret-key-for-signing-jwt-tokens-change-in-production
jwt.expiration-ms=86400000

# Stripe (optional – leave empty to skip Stripe init)
stripe.api-key=

# Uploaded images (directory relative to working directory)
app.upload-dir=uploads

# Allow larger image uploads (default is 1MB)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Email verification via Brevo. "From" must be a verified sender in Brevo (Senders & IP).
app.mail.from=jlaaam@ac.sce.ac.il
# Frontend URL used in verification emails. Use a URL reachable from the device that opens the link.
# - Local dev on phone: use your PC's LAN IP, e.g. http://192.168.1.100:3000 (run frontend with --host so it listens on 0.0.0.0)
# - Production: use your deployed app URL, e.g. https://your-app.vercel.app
app.frontend-url=http://localhost:3000
# Admin accounts are managed manually (DB/admin process). Public registration always creates CUSTOMER users.
# Gmail SMTP (use App Password, not your normal password):
# spring.mail.host=smtp.gmail.com
# spring.mail.port=587
# spring.mail.username=your@gmail.com
# spring.mail.password=your-app-password
# spring.mail.properties.mail.smtp.auth=true
# spring.mail.properties.mail.smtp.starttls.enable=true

# To use MySQL: 1) Create DB: CREATE DATABASE multi_stores;
# 2) Set password in application-mysql.properties (or env MYSQL password)
# 3) Run with: --spring.profiles.active=mysql
# Brevo SMTP – Authentication failed = wrong username or password
# 1) Brevo → Settings → SMTP & API → SMTP tab: copy the "SMTP login" (email) → spring.mail.username
# 2) Use the full SMTP key you copied when you created "jib_backend_key" → spring.mail.password (no spaces)
# 3) If 587 fails, try port 2525 (change spring.mail.port=2525)
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
# Read SMTP credentials from environment variables in production.
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
