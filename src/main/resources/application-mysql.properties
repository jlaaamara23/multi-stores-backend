# MySQL profile: run with --spring.profiles.active=mysql
# Create the DB first: CREATE DATABASE multi_stores;

spring.datasource.url=jdbc:mysql://127.0.0.1:3307/multi_stores?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Optional: disable H2 console when using MySQL
spring.h2.console.enabled=false
